ai_usage_summary: |
  Used ChatGPT/Codex for local code generation, debugging, and methodology drafting.
  No candidate data was sent to hosted model APIs during ranking, and the submitted
  ranker runs offline with deterministic rules.

methodology_summary: |
  Offline deterministic ranker built directly from the Senior AI Engineer JD.
  It combines skill/career evidence for production retrieval, ranking, vector
  search, evaluation, Python, LLM systems, and product-company shipping history
  with behavioral availability signals such as response rate, recent activity,
  notice period, interview completion, and open-to-work status. Logistics favor
  India, Pune/Noida/Delhi NCR/Mumbai/Hyderabad/Bangalore, hybrid/onsite fit,
  and relocation willingness. Honeypot penalties reduce keyword-heavy
  non-technical profiles, impossible expert-skill patterns, and inconsistent
  timelines. The script streams candidates.jsonl once, sorts deterministic
  scores, and writes the required top-100 CSV with grounded reasoning.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
